name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app/main.py && python -m py_compile app/config.py && echo "Syntax OK"

      - name: Module structure check
        run: python -c "
          import importlib.util;
          modules = ['app.models.patent', 'app.models.search', 'app.models.ingest'];
          [print(f'{m} OK') for m in modules if importlib.util.find_spec(m)]
          "

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
